<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Hero Rush</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main id="app">
      <section id="auth" class="screen active">
        <form id="authForm" class="auth-card">
          <div class="brand">
            <span class="logo-mark"></span>
            <span>Hero Rush</span>
          </div>
          <h1>Hero Rush</h1>
          <div class="auth-tabs">
            <button id="loginTab" class="auth-tab active" type="button">Вход</button>
            <button id="registerTab" class="auth-tab" type="button">Регистрация</button>
          </div>
          <label id="nickField">
            <span>Ник</span>
            <input id="authNick" autocomplete="nickname" maxlength="18">
          </label>
          <label>
            <span>Email</span>
            <input id="authEmail" type="email" autocomplete="email" required>
          </label>
          <label>
            <span>Пароль</span>
            <input id="authPassword" type="password" autocomplete="current-password" minlength="6" required>
          </label>
          <div id="authError" class="auth-error"></div>
          <button id="authSubmit" class="primary" type="submit">Войти</button>
        </form>
      </section>

      <section id="menu" class="screen">
        <div class="hero">
          <img class="main-logo" src="assets/hero-rush-logo-transparent.png" alt="Hero Rush">
          <button id="playButton" class="primary">Играть</button>
        </div>
        <div class="panel account-panel">
          <div class="panel-head">
            <h2>Онлайн</h2>
            <button id="logoutButton" class="secondary">Выйти</button>
          </div>
          <div class="account-line">
            <span id="accountName">Игрок</span>
            <span><span id="accountWins">0</span> побед</span>
          </div>
          <div class="online-actions">
            <button id="quickMatchButton" class="primary">Быстрый матч</button>
            <button id="createRoomButton" class="secondary">Создать комнату</button>
          </div>
          <div class="join-row">
            <input id="roomCodeInput" placeholder="Код комнаты">
            <button id="joinRoomButton" class="secondary">Войти</button>
          </div>
          <div id="onlineStatus" class="online-status">Оффлайн</div>
        </div>
        <div class="panel roster-panel">
          <h2>Выбор героя</h2>
          <div id="heroSelect" class="hero-select"></div>
        </div>
        <div class="panel shop-panel">
          <div class="panel-head">
            <h2>Магазин</h2>
            <div class="wallet"><span id="walletCoins">0</span> монет</div>
          </div>
          <div id="shopItems" class="shop-items"></div>
        </div>
      </section>

      <section id="game" class="screen">
        <canvas id="gameCanvas" width="1280" height="720" aria-label="Игровая арена"></canvas>
        <div class="hud top-left">
          <div class="stat"><span id="timer">3:00</span><small>время</small></div>
          <div class="stat"><span id="gems">0</span><small>кристаллы</small></div>
          <div class="stat"><span id="coins">0</span><small>монеты</small></div>
        </div>
        <div id="squadBar" class="squad-bar"></div>
        <button id="pauseButton" class="icon-button" aria-label="Пауза">II</button>
        <div id="joystick" class="joystick" aria-label="Виртуальный джойстик">
          <div id="stick" class="stick"></div>
        </div>
      </section>

      <section id="results" class="screen">
        <div class="results-card">
          <img id="victoryLogo" class="victory-logo" src="assets/victory-logo-transparent.png" alt="Победа" hidden>
          <h1 id="resultTitle">Матч завершен</h1>
          <img id="placeLogo" class="place-logo" alt="" hidden>
          <div id="rewardLine" class="reward-line"></div>
          <div id="scoreboard" class="scoreboard"></div>
          <div class="result-actions">
            <button id="againButton" class="primary">Еще матч</button>
            <button id="menuButton" class="secondary">Меню</button>
          </div>
        </div>
      </section>
    </main>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="game.js"></script>
  </body>
</html>
